<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>To-Do App</h1>

    <div class="input-group">
      <input id="task-input" type="text" placeholder="Add your task" />

      <input id="due-date-input" type="date" />

      <button id="add-btn">Add Task</button>
    </div>

    <div class="filter-group">
      <button id="all-filter">All</button>
      <button id="active-filter">Active</button>
      <button id="completed-filter">Completed</button>
    </div>
    <div id="task-counter">
      <h3 id="total-tasks">0 Tasks</h3>
      <p id="task-summary">0 Active • 0 Completed</p>
    </div>
    <ul id="task-list"></ul>
    <p id="empty-state">No tasks to display.</p>

    <script src="script.js"></script>
  </body>
</html>
